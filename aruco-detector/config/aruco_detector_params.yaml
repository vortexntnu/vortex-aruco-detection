
/**:
  ros__parameters:

    subs:
      image_topic: "/orca/front_camera/image_color"
      camera_info_topic: "/orca/front_camera/camera_info"

    pubs:
      aruco_image: "/aruco_detector/image"
      aruco_poses: "/aruco_detector/markers"
      board_pose: "/aruco_detector/board"
      landmarks: "/aruco_detector/landmarks"

    logger_service_name: "/toggle_marker_logger"

    detect_board: true  # Set to true to detect aruco boards
    visualize: true  # Set to true to draw the detected markers and board on the image
    log_markers: true  # Set to true to log the detected markers
    publish_detections: true
    publish_landmarks: true
    id_detection_secure_write_interval: 5
    blacklisted_ids: [0]

      # TAC ARUCO PARAMETERS
    aruco:
      marker_size: 0.150
      dictionary: "DICT_ARUCO_ORIGINAL"


    #TAC ARUCO BOARD PARAMETERS
    board:
      xDist: 0.430
      yDist: 0.830
      ids: [28, 7, 96, 19]

    # Vortex docking plate
    # board:
    #   xDist: 0.462
    #   yDist: 0.862
    #   ids: [28, 7, 96, 19]
